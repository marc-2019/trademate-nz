# =============================================================================
# BossBoard - Production Docker Compose
# =============================================================================
#
# Usage:
#   docker-compose -f docker-compose.production.yml up -d
#
# Prerequisites:
#   - Copy .env.production.example to .env.production and fill in values
#   - SSL certificates in /etc/letsencrypt/ (use scripts/deploy.sh ssl-setup)
#
# Architecture:
#   nginx (80/443) -> bossboard-api (29000) -> postgres (5432) + redis (6379)
#
# =============================================================================

services:
  # ===========================================================================
  # Nginx Reverse Proxy - SSL Termination & Static Files
  # ===========================================================================
  bossboard-nginx:
    image: nginx:1.25-alpine
    container_name: bossboard-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/var/www/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      bossboard-api:
        condition: service_healthy
    networks:
      - bossboard-production
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/nginx-health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # ===========================================================================
  # API Server - Node.js/Express (Production Build)
  # ===========================================================================
  bossboard-api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: production
    container_name: bossboard-api
    expose:
      - "29000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=29000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bossboard}:${POSTGRES_PASSWORD}@bossboard-postgres:5432/${POSTGRES_DB:-bossboard}
      - REDIS_URL=redis://bossboard-redis:6379
    depends_on:
      bossboard-postgres:
        condition: service_healthy
      bossboard-redis:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads
    networks:
      - bossboard-production
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:29000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

  # ===========================================================================
  # PostgreSQL 16 - Primary Database
  # ===========================================================================
  bossboard-postgres:
    image: postgres:16-alpine
    container_name: bossboard-postgres
    expose:
      - "5432"
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bossboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bossboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - postgres_backups:/backups
    networks:
      - bossboard-production
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bossboard} -d ${POSTGRES_DB:-bossboard}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "log_min_duration_statement=1000"

  # ===========================================================================
  # Redis 7 - Session Cache & Job Queues
  # ===========================================================================
  bossboard-redis:
    image: redis:7-alpine
    container_name: bossboard-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - bossboard-production
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru

# =============================================================================
# Persistent Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  postgres_backups:
    driver: local
  redis_data:
    driver: local
  api_uploads:
    driver: local
  nginx_logs:
    driver: local

# =============================================================================
# Network
# =============================================================================
networks:
  bossboard-production:
    name: bossboard-production
    driver: bridge
