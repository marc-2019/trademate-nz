# =============================================================================
# TradeMate NZ - Nginx Production Configuration
# =============================================================================
#
# Handles:
#   - SSL termination with Let's Encrypt certificates
#   - Reverse proxy to API container
#   - Static file serving for landing page
#   - Security headers
#   - Rate limiting
#   - Gzip compression
#
# Domains:
#   - trademate.co.nz       -> Static landing page
#   - www.trademate.co.nz   -> Redirect to trademate.co.nz
#   - api.trademate.co.nz   -> API proxy
#
# =============================================================================

worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # =========================================================================
    # Basic Settings
    # =========================================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Client body size - allows photo uploads up to 10MB
    client_max_body_size 10m;

    # =========================================================================
    # Logging
    # =========================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # =========================================================================
    # Gzip Compression
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # =========================================================================
    # Rate Limiting
    # =========================================================================

    # General API rate limit: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;

    # Auth rate limit: 5 requests/second per IP (prevents brute force)
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;

    # Strict rate limit for registration: 3 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_register:10m rate=3r/m;

    limit_req_status 429;

    # =========================================================================
    # Upstream - API Server
    # =========================================================================
    upstream trademate_api {
        server trademate-api:29000;
        keepalive 32;
    }

    # =========================================================================
    # HTTP -> HTTPS Redirect (all domains)
    # =========================================================================
    server {
        listen 80;
        server_name trademate.co.nz www.trademate.co.nz api.trademate.co.nz;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Nginx health check (used by Docker healthcheck, no redirect)
        location = /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Redirect all other HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # www.trademate.co.nz -> trademate.co.nz Redirect
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name www.trademate.co.nz;

        ssl_certificate /etc/letsencrypt/live/api.trademate.co.nz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.trademate.co.nz/privkey.pem;
        include /etc/nginx/ssl-params.conf;

        return 301 https://trademate.co.nz$request_uri;
    }

    # =========================================================================
    # trademate.co.nz - Landing Page (Static Files)
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name trademate.co.nz;

        # SSL Configuration
        ssl_certificate /etc/letsencrypt/live/api.trademate.co.nz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.trademate.co.nz/privkey.pem;
        include /etc/nginx/ssl-params.conf;

        # Security Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.trademate.co.nz;" always;

        # Static landing page
        root /var/www/html;
        index index.html;

        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Deny hidden files
        location ~ /\. {
            deny all;
        }
    }

    # =========================================================================
    # api.trademate.co.nz - API Reverse Proxy
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name api.trademate.co.nz;

        # SSL Configuration
        ssl_certificate /etc/letsencrypt/live/api.trademate.co.nz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.trademate.co.nz/privkey.pem;
        include /etc/nginx/ssl-params.conf;

        # Security Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Health check endpoint (no rate limiting)
        location = /health {
            proxy_pass http://trademate_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            access_log off;
        }

        # Auth endpoints - stricter rate limiting
        location /api/v1/auth/register {
            limit_req zone=api_register burst=2 nodelay;

            proxy_pass http://trademate_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api/v1/auth/ {
            limit_req zone=api_auth burst=10 nodelay;

            proxy_pass http://trademate_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # API endpoints - general rate limiting
        location /api/ {
            limit_req zone=api_general burst=50 nodelay;

            proxy_pass http://trademate_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Compliance/SWMS endpoints (can take longer due to AI generation)
        location /compliance/ {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass http://trademate_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # Deny all other requests
        location / {
            return 404 '{"error": "Not Found"}';
            add_header Content-Type application/json;
        }
    }

    # =========================================================================
    # SSL Parameters (included by server blocks above)
    # =========================================================================
    # This file is created by the deploy script, but here are the defaults
    # that would be in /etc/nginx/ssl-params.conf:
    #
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:...;
    # ssl_prefer_server_ciphers off;
    # ssl_session_timeout 1d;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_tickets off;
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;
    # resolver_timeout 5s;
}
