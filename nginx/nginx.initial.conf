# =============================================================================
# TradeMate NZ - Nginx Initial Configuration (HTTP Only)
# =============================================================================
#
# This configuration is used BEFORE SSL certificates are generated.
# It serves only HTTP on port 80 so that certbot can perform the
# ACME challenge and obtain Let's Encrypt certificates.
#
# After SSL certificates are obtained, replace this with nginx.conf
# (the full SSL-enabled configuration).
#
# Usage:
#   1. Copy this file to nginx/nginx.conf
#   2. Start containers with docker-compose.production.yml
#   3. Run certbot to obtain certificates
#   4. Replace nginx.conf with the full SSL version
#   5. Reload nginx
#
# =============================================================================

worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # =========================================================================
    # Basic Settings
    # =========================================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Client body size - allows photo uploads up to 10MB
    client_max_body_size 10m;

    # =========================================================================
    # Logging
    # =========================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # =========================================================================
    # Gzip Compression
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # =========================================================================
    # Rate Limiting
    # =========================================================================
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
    limit_req_status 429;

    # =========================================================================
    # Upstream - API Server
    # =========================================================================
    upstream trademate_api {
        server trademate-api:29000;
        keepalive 32;
    }

    # =========================================================================
    # HTTP Server (Port 80)
    # =========================================================================
    server {
        listen 80;
        server_name trademate.co.nz www.trademate.co.nz api.trademate.co.nz;

        # Let's Encrypt ACME challenge - MUST be accessible
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Nginx health check
        location = /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Health check endpoint
        location = /health {
            proxy_pass http://trademate_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            access_log off;
        }

        # Auth endpoints - stricter rate limiting
        location /api/v1/auth/ {
            limit_req zone=api_auth burst=10 nodelay;

            proxy_pass http://trademate_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # API endpoints
        location /api/ {
            limit_req zone=api_general burst=50 nodelay;

            proxy_pass http://trademate_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Compliance/SWMS endpoints
        location /compliance/ {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass http://trademate_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # Static landing page
        root /var/www/html;
        index index.html;

        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }
    }
}
