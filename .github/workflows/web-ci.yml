# BossBoard Web - Lint, type-check, route-link integrity
# Runs on PR + push for changes under apps/web/ to keep the dashboard
# free of dead navigation links (PIR action #2 from 2026-04-27 incident).

name: BossBoard Web CI

on:
  push:
    branches: [master, main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/web-ci.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  check:
    name: Lint, type-check & route integrity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Route-link integrity check
        working-directory: apps/web
        run: npm run check:routes

      - name: TypeScript build
        working-directory: apps/web
        run: npx tsc --noEmit
