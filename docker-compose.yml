services:
  # =============================================================================
  # API Server
  # =============================================================================
  bossboard-api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: development
    container_name: bossboard-api
    ports:
      - "29000:29000"
    environment:
      - NODE_ENV=development
      - PORT=29000
      - DATABASE_URL=postgresql://bossboard:${POSTGRES_PASSWORD:-bossboard_dev_2026}@bossboard-postgres:5432/bossboard
      - REDIS_URL=redis://bossboard-redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - USE_LOCAL_LLM=${USE_LOCAL_LLM:-true}
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-qwen/qwen3-vl-4b}
      - JWT_SECRET=${JWT_SECRET:-bossboard_jwt_dev_secret_2026}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-bossboard_jwt_refresh_dev_2026}
      # Sentry: optional. When unset, services/sentry.ts no-ops so local
      # dev + CI stay frictionless. Set in Railway prod env to enable.
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-}
    depends_on:
      bossboard-postgres:
        condition: service_healthy
      bossboard-redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src:ro
      - ./apps/api/package.json:/app/package.json:ro
      - ./apps/api/tsconfig.json:/app/tsconfig.json:ro
      - ./apps/api/jest.config.js:/app/jest.config.js:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:29000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  bossboard-postgres:
    image: postgres:16-alpine
    container_name: bossboard-postgres
    environment:
      POSTGRES_USER: bossboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bossboard_dev_2026}
      POSTGRES_DB: bossboard
    ports:
      - "29432:5432"
    volumes:
      - bossboard_postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bossboard -d bossboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # Redis Cache
  # =============================================================================
  bossboard-redis:
    image: redis:7-alpine
    container_name: bossboard-redis
    ports:
      - "29379:6379"
    volumes:
      - bossboard_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # Web Frontend (Expo Web via nginx)
  # =============================================================================
  bossboard-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: bossboard-web
    ports:
      - "29080:80"
    depends_on:
      bossboard-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  bossboard_postgres_data:
  bossboard_redis_data:

networks:
  default:
    name: bossboard-network
